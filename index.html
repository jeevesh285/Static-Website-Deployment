<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevOps Project</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #0077cc;
        }

        p {
            font-size: 18px;
            color: #555;
        }

        .footer {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }

        button {
            background: #0077cc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #005fa3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Welcome to My DevOps Project</h1>
    <p>This website is running inside a Docker container using Nginx.</p>

    <button onclick="showMessage()">Click Me</button>

    <p id="message"></p>

    <div class="footer">
        Created by Jeevesh
    </div>
</div>

<script>
function showMessage() {
    document.getElementById("message").innerHTML =
        "🎉 Congratulations! Your Docker deployment is working successfully.";
}
</script>

</body>
</html>
